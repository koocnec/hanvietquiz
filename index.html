<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="google-signin-client_id" content="85827665948-c2a22slp6oivnrj0bia61bftjknv0ecq.apps.googleusercontent.com">
  <title>HQ</title>
  <style>
    #appBootSplash{position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;width:100%;height:100vh;height:100dvh;background:#05080d;opacity:1;visibility:visible;transition:opacity .24s ease,visibility .24s ease}
    #appBootSplash img{display:block;width:96px;height:96px;object-fit:contain}
    body.hvq-app-ready #appBootSplash{opacity:0;visibility:hidden;pointer-events:none}
  </style>
  <!-- App icon điện thoại - FIX v2: dùng file mới để tránh iPhone giữ cache icon chữ H -->
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HQ">
  <meta name="application-name" content="HQ">

  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/hq-phone-icon-32-v2.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/hq-phone-icon-192-v2.png">

  <link rel="apple-touch-icon" href="./assets/hq-phone-icon-180-v2.png">
  <link rel="apple-touch-icon" sizes="120x120" href="./assets/hq-phone-icon-120-v2.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./assets/hq-phone-icon-152-v2.png">
  <link rel="apple-touch-icon" sizes="167x167" href="./assets/hq-phone-icon-167-v2.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/hq-phone-icon-180-v2.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./assets/hq-phone-icon-180-v2.png">

  <link rel="manifest" href="./manifest.webmanifest?v=mobile-splash-v3">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <script src="https://accounts.google.com/gsi/client?hl=vi" async defer onload="window.initGoogleAuth && window.initGoogleAuth()"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=learn-exit-button-v1">
</head>
<body>
  <div id="appBootSplash" role="status" aria-label="Đang tải HanVietQuiz">
    <img src="./assets/hq-logo-nw.png" alt="HanVietQuiz">
  </div>
  <div id="toast" class="toast"><span id="toastIcon" class="iconify text-indigo-400" data-icon="lucide:check-circle"></span><span id="toastText"></span></div>

  <div id="modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card">
      <div class="flex items-center justify-between gap-4">
        <h2 id="modalTitle" class="text-lg font-bold"></h2>
        <button data-close-modal class="icon-button"><span class="iconify" data-icon="lucide:x"></span></button>
      </div>
      <div id="modalBody" class="mt-5"></div>
    </div>
  </div>

  <nav class="topbar">
    <button class="brand" data-route="home" aria-label="Trang chủ">
      <span class="brand-mark" aria-hidden="true">
        <img src="./assets/hq-logo-nw.png" alt="HanVietQuiz">
      </span>
    </button>
    <div id="topNav" class="top-nav"></div>
    <div class="top-actions">
      <button id="searchButton" class="icon-button" title="Tìm kiếm"><span class="iconify" data-icon="lucide:search"></span></button>
      <button id="notificationButton" class="icon-button relative" title="Thông báo">
        <span class="iconify" data-icon="lucide:bell"></span><i class="notification-dot"></i>
      </button>
      <button id="profileButton" class="profile-button"><span class="avatar">HV</span><span class="hidden sm:inline">Khách</span></button>
    </div>
    <div id="notificationMenu" class="dropdown-panel"></div>
    <div id="profileMenu" class="dropdown-panel profile-menu"></div>
  </nav>

  <div class="app-shell">
    <aside class="sidebar">
      <p class="sidebar-label">Menu chính</p>
      <div id="mainSidebar"></div>
      <p class="sidebar-label mt-6">Công cụ</p>
      <div id="toolSidebar"></div>
      <button class="upgrade-card" data-action="upgrade">
        <span class="iconify text-indigo-400 text-xl" data-icon="lucide:crown"></span>
        <strong>Nâng cấp Pro</strong>
        <small>Mở khóa toàn bộ bài học và phân tích nâng cao.</small>
        <span class="upgrade-price">59k/tháng</span>
      </button>
    </aside>

    <main id="app" class="content"></main>
  </div>

  <template id="pageHeader">
    <header class="page-header">
      <div><h1 data-title></h1><p data-subtitle></p></div>
      <div data-actions class="flex flex-wrap gap-2"></div>
    </header>
  </template>

  <script src="./app.js?v=cloud-safe-restore-v1"></script>
</body>
</html>
